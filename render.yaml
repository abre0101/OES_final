services:
  # Web Service
  - type: web
    name: oes-web
    env: docker
    plan: free
    buildCommand: echo "No build needed"
    startCommand: php -S 0.0.0.0:$PORT -t .
    healthCheckPath: /health.php
    envVars:
      - key: PHP_VERSION
        value: 8.2
      - key: APP_ENV
        value: production
      - fromDatabase:
          name: oes-mysql
          property: host
        key: MYSQLHOST
      - fromDatabase:
          name: oes-mysql
          property: port
        key: MYSQLPORT
      - fromDatabase:
          name: oes-mysql
          property: database
        key: MYSQLDATABASE
      - fromDatabase:
          name: oes-mysql
          property: user
        key: MYSQLUSER
      - fromDatabase:
          name: oes-mysql
          property: password
        key: MYSQLPASSWORD

databases:
  # MySQL Database
  - name: oes-mysql
    databaseName: oes_professional
    plan: free
